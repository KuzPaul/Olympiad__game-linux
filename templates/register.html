{% extends "base.html" %}
{% block title %}Регистрация · Linux Olympiad{% endblock %}
{% block page_title %}Регистрация студента{% endblock %}
{% block content %}
<section class="auth-layout single-column">
    <div class="auth-card glass-card wide-card">
        <div class="card-badge">Новый участник</div>
        <h2>Создание учётной записи</h2>
        <form method="post" class="form-grid two-cols">
            <label>
                <span>Фамилия</span>
                <input type="text" name="surname" required>
            </label>
            <label>
                <span>Имя</span>
                <input type="text" name="name" required>
            </label>
            <label>
                <span>Отчество</span>
                <input type="text" name="patronymic">
            </label>
            <label>
                <span>Группа</span>
                <input type="text" name="group_number" placeholder="Например, 2311" required>
            </label>
            <label>
                <span>Логин</span>
                <input type="text" name="login" placeholder="Без пробелов" required>
            </label>
            <label>
                <span>Пароль</span>
                <input type="password" name="password" required>
            </label>
            <div class="full-width">
                <button class="primary-btn" type="submit">Зарегистрироваться</button>
            </div>
        </form>
        <div class="auth-links">
            Уже зарегистрирован? <a href="{{ url_for('login') }}">Перейти ко входу</a>
        </div>
    </div>
</section>
{% endblock %}
